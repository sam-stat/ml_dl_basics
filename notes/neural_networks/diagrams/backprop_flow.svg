<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 330" width="760" height="330" font-family="Georgia, 'Times New Roman', serif">
  <defs>
    <marker id="bf" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#4f86c6"/>
    </marker>
    <marker id="bb" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#d9534f"/>
    </marker>
    <filter id="rough" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="fractalNoise" baseFrequency="0.009" numOctaves="2" seed="4" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="1.4" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
  </defs>

  <rect width="760" height="330" fill="#ffffff"/>

  <g filter="url(#rough)">
    <!-- forward arrows -->
    <line x1="150" y1="121" x2="203" y2="121" stroke="#4f86c6" stroke-width="1.6" marker-end="url(#bf)"/>
    <line x1="375" y1="121" x2="418" y2="121" stroke="#4f86c6" stroke-width="1.6" marker-end="url(#bf)"/>
    <line x1="600" y1="121" x2="648" y2="121" stroke="#4f86c6" stroke-width="1.6" marker-end="url(#bf)"/>
    <!-- backward arrows -->
    <line x1="650" y1="178" x2="602" y2="178" stroke="#d9534f" stroke-width="1.5" marker-end="url(#bb)"/>
    <line x1="420" y1="178" x2="377" y2="178" stroke="#d9534f" stroke-width="1.5" marker-end="url(#bb)"/>
    <line x1="205" y1="178" x2="152" y2="178" stroke="#d9534f" stroke-width="1.5" marker-end="url(#bb)"/>
    <!-- boxes -->
    <rect x="40"  y="88" width="110" height="66" rx="5" fill="#eef4fb" stroke="#4f86c6" stroke-width="1.7"/>
    <rect x="205" y="88" width="170" height="66" rx="5" fill="#edfaed" stroke="#5cb85c" stroke-width="1.7"/>
    <rect x="420" y="88" width="180" height="66" rx="5" fill="#edfaed" stroke="#5cb85c" stroke-width="1.7"/>
    <rect x="650" y="88" width="90"  height="66" rx="5" fill="#fdeaea" stroke="#d9534f" stroke-width="1.7"/>
    <!-- update box -->
    <rect x="130" y="252" width="500" height="44" rx="5" fill="#fafafa" stroke="#cfcfcf" stroke-width="1"/>
  </g>

  <!-- pass labels -->
  <text x="400" y="64" text-anchor="middle" font-size="12" font-weight="bold" fill="#3a6ea5">▶ Forward Pass <tspan font-weight="normal" fill="#555">— compute a<tspan baseline-shift="super" font-size="8">(ℓ)</tspan>, obtain ℒ</tspan></text>
  <text x="400" y="224" text-anchor="middle" font-size="12" font-weight="bold" fill="#c0463f">◀ Backward Pass <tspan font-weight="normal" fill="#555">— chain rule:  ∂ℒ/∂W<tspan baseline-shift="super" font-size="8">(ℓ)</tspan> = δ<tspan baseline-shift="super" font-size="8">(ℓ)</tspan>(a<tspan baseline-shift="super" font-size="8">(ℓ−1)</tspan>)<tspan baseline-shift="super" font-size="8">⊤</tspan></tspan></text>

  <!-- box text -->
  <text x="95" y="116" text-anchor="middle" font-size="11" fill="#2c5f93">Input</text>
  <text x="95" y="134" text-anchor="middle" font-size="11" fill="#2c5f93">x ∈ ℝ<tspan baseline-shift="super" font-size="8">n</tspan></text>

  <text x="290" y="108" text-anchor="middle" font-size="10.5" fill="#3a8a3a">Layer ℓ = 1</text>
  <text x="290" y="125" text-anchor="middle" font-size="10.5" fill="#333">z<tspan baseline-shift="super" font-size="7.5">(1)</tspan> = W<tspan baseline-shift="super" font-size="7.5">(1)</tspan>x + b<tspan baseline-shift="super" font-size="7.5">(1)</tspan></text>
  <text x="290" y="143" text-anchor="middle" font-size="10.5" fill="#333">a<tspan baseline-shift="super" font-size="7.5">(1)</tspan> = σ(z<tspan baseline-shift="super" font-size="7.5">(1)</tspan>)</text>

  <text x="510" y="108" text-anchor="middle" font-size="10.5" fill="#3a8a3a">Layer ℓ = 2</text>
  <text x="510" y="125" text-anchor="middle" font-size="10.5" fill="#333">z<tspan baseline-shift="super" font-size="7.5">(2)</tspan> = W<tspan baseline-shift="super" font-size="7.5">(2)</tspan>a<tspan baseline-shift="super" font-size="7.5">(1)</tspan> + b<tspan baseline-shift="super" font-size="7.5">(2)</tspan></text>
  <text x="510" y="143" text-anchor="middle" font-size="10.5" fill="#333">a<tspan baseline-shift="super" font-size="7.5">(2)</tspan> = σ(z<tspan baseline-shift="super" font-size="7.5">(2)</tspan>)</text>

  <text x="695" y="116" text-anchor="middle" font-size="11" fill="#a83a36">Loss</text>
  <text x="695" y="134" text-anchor="middle" font-size="11" fill="#a83a36">ℒ(ŷ, y)</text>

  <!-- gradient labels -->
  <text x="626" y="196" text-anchor="middle" font-size="9.5" fill="#a83a36">∂ℒ/∂a<tspan baseline-shift="super" font-size="7">(2)</tspan></text>
  <text x="398" y="196" text-anchor="middle" font-size="9.5" fill="#a83a36">∂ℒ/∂W<tspan baseline-shift="super" font-size="7">(2)</tspan></text>
  <text x="178" y="196" text-anchor="middle" font-size="9.5" fill="#a83a36">∂ℒ/∂W<tspan baseline-shift="super" font-size="7">(1)</tspan></text>

  <!-- update box text -->
  <text x="380" y="279" text-anchor="middle" font-size="12" fill="#333"><tspan font-weight="bold">Update:</tspan>  W<tspan baseline-shift="super" font-size="8">(ℓ)</tspan> ← W<tspan baseline-shift="super" font-size="8">(ℓ)</tspan> − η ∂ℒ/∂W<tspan baseline-shift="super" font-size="8">(ℓ)</tspan>     (η = learning rate)</text>
</svg>
