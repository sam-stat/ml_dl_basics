<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 370" width="900" height="370" font-family="Georgia, 'Times New Roman', serif">
  <defs>
    <marker id="cp" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#9aa3ab"/>
    </marker>
    <filter id="rough" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="fractalNoise" baseFrequency="0.009" numOctaves="2" seed="4" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="1.4" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
  </defs>

  <rect width="900" height="370" fill="#ffffff"/>
  <text x="450" y="28" text-anchor="middle" font-size="16" font-weight="bold" fill="#2a2a2a">CNN Pipeline — Convolution → Pooling → Classification</text>

  <g filter="url(#rough)">
    <!-- flow arrows -->
    <g stroke="#9aa3ab" stroke-width="1.4">
      <line x1="84"  y1="150" x2="124" y2="150" marker-end="url(#cp)"/>
      <line x1="186" y1="150" x2="244" y2="150" marker-end="url(#cp)"/>
      <line x1="302" y1="150" x2="364" y2="150" marker-end="url(#cp)"/>
      <line x1="424" y1="150" x2="484" y2="150" marker-end="url(#cp)"/>
      <line x1="540" y1="150" x2="598" y2="150" marker-end="url(#cp)"/>
      <line x1="672" y1="150" x2="698" y2="150" marker-end="url(#cp)"/>
      <line x1="778" y1="150" x2="798" y2="150" marker-end="url(#cp)"/>
    </g>
    <!-- input (blue volume) -->
    <rect x="47" y="73" width="36" height="150" fill="#cfe0f5" stroke="#4f86c6" stroke-width="1"/>
    <rect x="40" y="80" width="36" height="150" fill="#eef4fb" stroke="#4f86c6" stroke-width="1.4"/>
    <!-- conv1 (green stack) -->
    <rect x="145" y="63" width="42" height="160" fill="#d4f0d4" stroke="#5cb85c" stroke-width="1"/>
    <rect x="138" y="70" width="42" height="160" fill="#edfaed" stroke="#5cb85c" stroke-width="1.4"/>
    <!-- pool1 (amber) -->
    <rect x="257" y="103" width="44" height="120" fill="#ffe9b8" stroke="#e0972f" stroke-width="1"/>
    <rect x="250" y="110" width="44" height="120" fill="#fff3cd" stroke="#e0972f" stroke-width="1.4"/>
    <!-- conv2 (green stack, taller) -->
    <rect x="377" y="45" width="46" height="178" fill="#d4f0d4" stroke="#5cb85c" stroke-width="1"/>
    <rect x="370" y="52" width="46" height="178" fill="#edfaed" stroke="#5cb85c" stroke-width="1.4"/>
    <!-- pool2 (amber) -->
    <rect x="497" y="123" width="44" height="100" fill="#ffe9b8" stroke="#e0972f" stroke-width="1"/>
    <rect x="490" y="130" width="44" height="100" fill="#fff3cd" stroke="#e0972f" stroke-width="1.4"/>
    <!-- flatten (cyan) -->
    <rect x="600" y="85" width="72" height="130" rx="5" fill="#e3f7fb" stroke="#46b5c9" stroke-width="1.5"/>
    <!-- FC (red) -->
    <rect x="700" y="112" width="78" height="76" rx="5" fill="#fdeaea" stroke="#d9534f" stroke-width="1.5"/>
    <!-- softmax (red) -->
    <rect x="800" y="112" width="88" height="76" rx="5" fill="#fbd9d7" stroke="#c0392b" stroke-width="1.5"/>
    <!-- formula box -->
    <rect x="60" y="288" width="780" height="66" rx="6" fill="#fafafa" stroke="#cfcfcf" stroke-width="1"/>
  </g>

  <!-- block labels -->
  <g text-anchor="middle" font-size="9.5" fill="#444">
    <text x="58" y="248">Input</text><text x="58" y="261" font-size="8.5">H×W×C</text>
    <text x="159" y="248">Conv+ReLU</text><text x="159" y="261" font-size="8.5">k filters</text>
    <text x="272" y="248">MaxPool</text><text x="272" y="261" font-size="8.5">↓ spatial</text>
    <text x="393" y="248">Conv+ReLU</text><text x="393" y="261" font-size="8.5">2k filters</text>
    <text x="512" y="248">MaxPool</text>
    <text x="636" y="146" font-size="9.5" fill="#1f7a8c">Flatten</text><text x="636" y="160" font-size="8.5" fill="#1f7a8c">3D → 1D</text>
    <text x="739" y="144" font-size="9.5" fill="#a83a36">Fully</text><text x="739" y="156" font-size="9.5" fill="#a83a36">Connected</text><text x="739" y="168" font-size="8.5" fill="#a83a36">+ ReLU</text>
    <text x="844" y="142" font-size="9.5" fill="#a02820">Softmax</text><text x="844" y="156" font-size="8.5" fill="#a02820">P(class|x)</text><text x="844" y="168" font-size="8.5" fill="#a02820">k classes</text>
  </g>

  <!-- formula box text -->
  <text x="80" y="315" font-size="11" fill="#333"><tspan font-weight="bold">Convolution:</tspan>  S(i, j) = Σ<tspan baseline-shift="sub" font-size="7.5">m,n</tspan> I(i+m, j+n) · K(m, n)    — same filter K at every position (<tspan font-weight="bold">weight sharing</tspan>)</text>
  <text x="80" y="338" font-size="11" fill="#333"><tspan font-weight="bold">Output size:</tspan>  H<tspan baseline-shift="sub" font-size="7.5">out</tspan> = ⌊ (H + 2p − k) / s ⌋ + 1</text>
</svg>
