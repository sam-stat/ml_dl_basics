<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 410" width="760" height="410" font-family="Georgia, 'Times New Roman', serif">
  <defs>
    <filter id="rough" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="fractalNoise" baseFrequency="0.009" numOctaves="2" seed="4" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="1.4" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <marker id="cfwarr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#777"/>
    </marker>
  </defs>
  <rect width="760" height="410" fill="#ffffff"/>
  <text x="380" y="26" text-anchor="middle" font-size="17" font-weight="bold" fill="#222">The forest is a weighting machine, not an averager</text>

  <!-- query -->
  <rect filter="url(#rough)" x="20" y="80" width="74" height="40" rx="6" fill="#eef4fb" stroke="#4f86c6" stroke-width="1.6"/>
  <text x="57" y="104" text-anchor="middle" font-size="13" fill="#2c5f93">query  x</text>
  <path filter="url(#rough)" d="M94,100 C 130,98 140,92 168,90" stroke="#777" stroke-width="1.3" fill="none" marker-end="url(#cfwarr)"/>
  <text x="120" y="138" text-anchor="middle" font-size="10.5" fill="#888">drop down</text>
  <text x="120" y="151" text-anchor="middle" font-size="10.5" fill="#888">all B trees</text>

  <!-- ===== Tree 1 ===== -->
  <circle filter="url(#rough)" cx="235" cy="80" r="7" fill="#fff" stroke="#888" stroke-width="1.3"/>
  <line filter="url(#rough)" x1="235" y1="87" x2="205" y2="110" stroke="#999" stroke-width="1.2"/>
  <line filter="url(#rough)" x1="235" y1="87" x2="266" y2="110" stroke="#999" stroke-width="1.2"/>
  <rect filter="url(#rough)" x="173" y="110" width="58" height="32" rx="4" fill="#f9f0ff" stroke="#9b59b6" stroke-width="2"/>
  <text x="202" y="130" text-anchor="middle" font-size="11" fill="#7a3fa0">x, i</text>
  <rect filter="url(#rough)" x="239" y="110" width="58" height="32" rx="4" fill="#f7f7f7" stroke="#ccc" stroke-width="1.2"/>
  <text x="268" y="130" text-anchor="middle" font-size="11" fill="#999">j</text>
  <text x="235" y="160" text-anchor="middle" font-size="11.5" fill="#555">Tree 1</text>

  <!-- ===== Tree 2 ===== -->
  <circle filter="url(#rough)" cx="410" cy="80" r="7" fill="#fff" stroke="#888" stroke-width="1.3"/>
  <line filter="url(#rough)" x1="410" y1="87" x2="380" y2="110" stroke="#999" stroke-width="1.2"/>
  <line filter="url(#rough)" x1="410" y1="87" x2="441" y2="110" stroke="#999" stroke-width="1.2"/>
  <rect filter="url(#rough)" x="348" y="110" width="58" height="32" rx="4" fill="#f9f0ff" stroke="#9b59b6" stroke-width="2"/>
  <text x="377" y="130" text-anchor="middle" font-size="11" fill="#7a3fa0">x, i</text>
  <rect filter="url(#rough)" x="414" y="110" width="58" height="32" rx="4" fill="#f7f7f7" stroke="#ccc" stroke-width="1.2"/>
  <text x="443" y="130" text-anchor="middle" font-size="11" fill="#999">j</text>
  <text x="410" y="160" text-anchor="middle" font-size="11.5" fill="#555">Tree 2</text>

  <!-- ===== Tree B ===== -->
  <circle filter="url(#rough)" cx="585" cy="80" r="7" fill="#fff" stroke="#888" stroke-width="1.3"/>
  <line filter="url(#rough)" x1="585" y1="87" x2="555" y2="110" stroke="#999" stroke-width="1.2"/>
  <line filter="url(#rough)" x1="585" y1="87" x2="616" y2="110" stroke="#999" stroke-width="1.2"/>
  <rect filter="url(#rough)" x="523" y="110" width="58" height="32" rx="4" fill="#f7f7f7" stroke="#ccc" stroke-width="1.2"/>
  <text x="552" y="130" text-anchor="middle" font-size="11" fill="#999">…</text>
  <rect filter="url(#rough)" x="589" y="110" width="58" height="32" rx="4" fill="#f9f0ff" stroke="#9b59b6" stroke-width="2"/>
  <text x="618" y="130" text-anchor="middle" font-size="11" fill="#7a3fa0">x, i, j</text>
  <text x="585" y="160" text-anchor="middle" font-size="11.5" fill="#555">Tree B</text>

  <text x="690" y="124" text-anchor="middle" font-size="11" fill="#7a3fa0">x's leaf</text>
  <text x="690" y="138" text-anchor="middle" font-size="11" fill="#7a3fa0">highlighted</text>

  <!-- ===== tally → weights ===== -->
  <text x="40" y="200" font-size="12.5" font-weight="bold" fill="#444">tally who shares x's leaf  →  weights α</text>
  <text x="95" y="231" text-anchor="end" font-size="12" fill="#3a8a3a">unit i</text>
  <rect filter="url(#rough)" x="105" y="221" width="360" height="15" rx="2" fill="#edfaed" stroke="#5cb85c" stroke-width="1.3"/>
  <rect filter="url(#rough)" x="105" y="221" width="360" height="15" rx="2" fill="#5cb85c" opacity="0.55"/>
  <text x="475" y="233" font-size="11.5" fill="#3a8a3a">α high  (3 / 3 trees)</text>
  <text x="95" y="261" text-anchor="end" font-size="12" fill="#9a6b1e">unit j</text>
  <rect filter="url(#rough)" x="105" y="251" width="120" height="15" rx="2" fill="#fff3cd" stroke="#f0ad4e" stroke-width="1.3"/>
  <rect filter="url(#rough)" x="105" y="251" width="120" height="15" rx="2" fill="#f0ad4e" opacity="0.55"/>
  <text x="235" y="263" font-size="11.5" fill="#9a6b1e">α low  (1 / 3 trees)</text>

  <!-- ===== footer formulas ===== -->
  <line filter="url(#rough)" x1="40" y1="288" x2="720" y2="288" stroke="#eee" stroke-width="1"/>
  <text x="380" y="314" text-anchor="middle" font-size="13" fill="#333">α<tspan dy="4" font-size="9">i</tspan><tspan dy="-4" font-size="13">(x) = (1 / B) Σ</tspan><tspan dy="4" font-size="9">b</tspan><tspan dy="-4" font-size="13">  1(X</tspan><tspan dy="4" font-size="9">i</tspan><tspan dy="-4" font-size="13"> ∈ L</tspan><tspan dy="4" font-size="9">b</tspan><tspan dy="-4" font-size="13">(x)) / |L</tspan><tspan dy="4" font-size="9">b</tspan><tspan dy="-4" font-size="13">(x)|</tspan></text>
  <text x="380" y="346" text-anchor="middle" font-size="14" fill="#a83a36">τ̂(x) = Σ<tspan dy="4" font-size="10">i</tspan><tspan dy="-4" font-size="14"> α</tspan><tspan dy="4" font-size="10">i</tspan><tspan dy="-4" font-size="14">(x) T̃</tspan><tspan dy="4" font-size="10">i</tspan><tspan dy="-4" font-size="14"> Ỹ</tspan><tspan dy="4" font-size="10">i</tspan><tspan dy="-4" font-size="14">  /  Σ</tspan><tspan dy="4" font-size="10">i</tspan><tspan dy="-4" font-size="14"> α</tspan><tspan dy="4" font-size="10">i</tspan><tspan dy="-4" font-size="14">(x) T̃</tspan><tspan dy="4" font-size="10">i</tspan><tspan dy="-4" font-size="14">²</tspan></text>
  <text x="380" y="384" text-anchor="middle" font-size="12" font-style="italic" fill="#666">α is a data-driven similarity weight: how often unit i reacts to treatment in the same leaf as x</text>
</svg>
