<script>
/**
 * Propensity Score Matching Visualization
 * Logic: Nearest Neighbor without replacement with Caliper constraint.
 */

// 1. DATA GENERATION & LOGIC
const initData = () => {
    const treated = [];
    for (let i = 0; i < 20; i++) {
        treated.push({ id: `t${i}`, score: 0.1 + Math.random() * 0.8, group: 'Treated' });
    }
    const control = [];
    for (let i = 0; i < 40; i++) {
        control.push({ id: `c${i}`, score: 0.1 + Math.random() * 0.8, group: 'Control' });
    }
    return { treated, control };
};

const runMatch = () => {
    const matches = [];
    const droppedIds = [];
    const matchedControlIds = [];
    
    // Copy control units to track availability (no replacement)
    let availableControls = [...state.controlUnits];

    // Iterate treated units
    state.treatedUnits.forEach(t => {
        let bestDist = Infinity;
        let bestIdx = -1;

        // Find nearest neighbor
        availableControls.forEach((c, idx) => {
            const dist = Math.abs(t.score - c.score);
            if (dist < bestDist) {
                bestDist = dist;
                bestIdx = idx;
            }
        });

        // Apply Caliper check
        if (bestIdx !== -1 && bestDist <= state.caliper) {
            const c = availableControls[bestIdx];
            matches.push({
                x1: t.score,
                y1: 1,
                x2: c.score,
                y2: 0,
                tId: t.id,
                cId: c.id
            });
            matchedControlIds.push(c.id);
            // Remove from availability
            availableControls.splice(bestIdx, 1);
        } else {
            droppedIds.push(t.id);
        }
    });

    // Update state
    state.matches = matches;
    state.dropped = droppedIds;
    state.matchedControlIds = matchedControlIds;

    // Sync HUD
    ui.setEditorial({
        hud: [
            { label: "Matched", value: matches.length.toString() },
            { label: "Dropped", value: droppedIds.length.toString() }
        ]
    });
};

const resetSim = () => {
    state.matches = [];
    state.dropped = [];
    state.matchedControlIds = [];
    ui.setEditorial({
        hud: [
            { label: "Matched", value: "0" },
            { label: "Dropped", value: "0" }
        ]
    });
};

// 2. APP INITIALIZATION
const { state, ui } = WH.createApp({
    title: "Propensity Score Matching",
    params: {
        caliper: { value: 0.1, min: 0.01, max: 0.3, step: 0.01, label: "Caliper Size" },
        match: { type: 'button', label: 'Match', onClick: runMatch },
        reset: { type: 'button', label: 'Reset', onClick: resetSim }
    },
    editorial: {
        hud: [
            { label: "Matched", value: "0" },
            { label: "Dropped", value: "0" }
        ]
    }
});

// Initialize Internal State
const initialData = initData();
state.treatedUnits = initialData.treated;
state.controlUnits = initialData.control;
state.matches = [];
state.dropped = [];
state.matchedControlIds = [];

// 3. VISUALIZATION
WH.initPlot('viz', ({ width, state }) => {
    // Proxy extraction
    const treated = [...state.treatedUnits];
    const control = [...state.controlUnits];
    const matches = [...state.matches];
    const droppedIds = [...state.dropped];
    const matchedControlIds = [...state.matchedControlIds];

    return {
        width,
        x: { 
            label: "Propensity Score →", 
            domain: [0, 1], 
            grid: true 
        },
        y: { 
            domain: [-0.2, 1.2], 
            ticks: [0, 1], 
            tickFormat: d => d === 1 ? "Treated" : "Control",
            label: null
        },
        marks: [
            // Background lines for groups
            Plot.ruleY([0, 1], { stroke: WH.getColor('--outline-variant'), strokeWidth: 1, strokeDasharray: "4,4" }),
            
            // Match Lines
            Plot.link(matches, {
                x1: "x1",
                y1: "y1",
                x2: "x2",
                y2: "y2",
                stroke: WH.getColor('--primary'),
                strokeOpacity: 0.5,
                strokeWidth: 1.5
            }),

            // Control Group Points
            Plot.dot(control, {
                x: "score",
                y: () => 0,
                fill: d => matchedControlIds.includes(d.id) ? WH.getColor('--chart-2') : WH.getColor('--surface-container-highest'),
                stroke: d => matchedControlIds.includes(d.id) ? WH.getColor('--chart-2') : WH.getColor('--outline'),
                r: 5,
                tip: true
            }),

            // Treated Group Points
            Plot.dot(treated, {
                x: "score",
                y: () => 1,
                fill: d => {
                    if (droppedIds.includes(d.id)) return WH.getColor('--chart-1');
                    if (matches.some(m => m.tId === d.id)) return WH.getColor('--chart-2');
                    return WH.getColor('--surface-container-highest');
                },
                stroke: d => {
                    if (droppedIds.includes(d.id)) return WH.getColor('--chart-1');
                    if (matches.some(m => m.tId === d.id)) return WH.getColor('--chart-2');
                    return WH.getColor('--outline');
                },
                r: 5,
                tip: true
            })
        ]
    };
});

// Final boot-up sync
resetSim();
