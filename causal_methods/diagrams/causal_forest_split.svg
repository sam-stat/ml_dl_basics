<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 430" width="720" height="430" font-family="Georgia, 'Times New Roman', serif">
  <defs>
    <filter id="rough" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="fractalNoise" baseFrequency="0.009" numOctaves="2" seed="4" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="1.4" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <marker id="cfsplitarr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#777"/>
    </marker>
  </defs>
  <rect width="720" height="430" fill="#ffffff"/>
  <text x="360" y="28" text-anchor="middle" font-size="17" font-weight="bold" fill="#222">Causal split — maximize the gap in treatment effect τ̂</text>

  <text x="185" y="56" text-anchor="middle" font-size="13" font-weight="bold" fill="#9a6b1e">Bad split — separates on a baseline feature</text>
  <text x="535" y="56" text-anchor="middle" font-size="13" font-weight="bold" fill="#a83a36">Good split — separates on the effect</text>
  <line filter="url(#rough)" x1="360" y1="68" x2="360" y2="332" stroke="#e3e3e3" stroke-width="1"/>

  <!-- ===== Panel A: bad split ===== -->
  <rect filter="url(#rough)" x="120" y="74" width="130" height="34" rx="5" fill="#eef4fb" stroke="#4f86c6" stroke-width="1.5"/>
  <text x="185" y="96" text-anchor="middle" font-size="12" fill="#2c5f93">parent   τ̄ = +5%</text>

  <path filter="url(#rough)" d="M155,108 L100,150" stroke="#777" stroke-width="1.3" marker-end="url(#cfsplitarr)"/>
  <path filter="url(#rough)" d="M215,108 L272,150" stroke="#777" stroke-width="1.3" marker-end="url(#cfsplitarr)"/>

  <rect filter="url(#rough)" x="35" y="152" width="120" height="46" rx="5" fill="#fff3cd" stroke="#f0ad4e" stroke-width="1.4"/>
  <text x="95" y="172" text-anchor="middle" font-size="11.5" fill="#9a6b1e">L  (opened app)</text>
  <text x="95" y="189" text-anchor="middle" font-size="12.5" fill="#9a6b1e">τ̂<tspan dy="4" font-size="9">L</tspan><tspan dy="-4" font-size="12.5"> = +5%</tspan></text>

  <rect filter="url(#rough)" x="215" y="152" width="120" height="46" rx="5" fill="#fff3cd" stroke="#f0ad4e" stroke-width="1.4"/>
  <text x="275" y="172" text-anchor="middle" font-size="11.5" fill="#9a6b1e">R  (didn't open)</text>
  <text x="275" y="189" text-anchor="middle" font-size="12.5" fill="#9a6b1e">τ̂<tspan dy="4" font-size="9">R</tspan><tspan dy="-4" font-size="12.5"> = +5%</tspan></text>

  <text x="185" y="228" text-anchor="middle" font-size="12" fill="#777">gap ≈ 0  →  useless for targeting</text>

  <!-- ===== Panel B: good split ===== -->
  <rect filter="url(#rough)" x="470" y="74" width="130" height="34" rx="5" fill="#eef4fb" stroke="#4f86c6" stroke-width="1.5"/>
  <text x="535" y="96" text-anchor="middle" font-size="12" fill="#2c5f93">parent   τ̄ = +5%</text>

  <path filter="url(#rough)" d="M505,108 L450,150" stroke="#777" stroke-width="1.3" marker-end="url(#cfsplitarr)"/>
  <path filter="url(#rough)" d="M565,108 L622,150" stroke="#777" stroke-width="1.3" marker-end="url(#cfsplitarr)"/>

  <rect filter="url(#rough)" x="385" y="152" width="120" height="46" rx="5" fill="#edfaed" stroke="#5cb85c" stroke-width="1.4"/>
  <text x="445" y="172" text-anchor="middle" font-size="11.5" fill="#3a8a3a">L  (low risk)</text>
  <text x="445" y="189" text-anchor="middle" font-size="12.5" fill="#3a8a3a">τ̂<tspan dy="4" font-size="9">L</tspan><tspan dy="-4" font-size="12.5"> = +15%</tspan></text>

  <rect filter="url(#rough)" x="565" y="152" width="120" height="46" rx="5" fill="#fdeaea" stroke="#d9534f" stroke-width="1.4"/>
  <text x="625" y="172" text-anchor="middle" font-size="11.5" fill="#a83a36">R  (high risk)</text>
  <text x="625" y="189" text-anchor="middle" font-size="12.5" fill="#a83a36">τ̂<tspan dy="4" font-size="9">R</tspan><tspan dy="-4" font-size="12.5"> = −1%</tspan></text>

  <text x="535" y="228" text-anchor="middle" font-size="12" fill="#3a8a3a">large gap  →  isolates a reaction neighborhood ✓</text>

  <!-- ===== footer formula ===== -->
  <line filter="url(#rough)" x1="40" y1="268" x2="680" y2="268" stroke="#eee" stroke-width="1"/>
  <text x="360" y="300" text-anchor="middle" font-size="14" fill="#333">maximize:   N<tspan dy="4" font-size="10">L</tspan><tspan dy="-4" font-size="14"> τ̂</tspan><tspan dy="4" font-size="10">L</tspan><tspan dy="-4" font-size="14">² + N</tspan><tspan dy="4" font-size="10">R</tspan><tspan dy="-4" font-size="14"> τ̂</tspan><tspan dy="4" font-size="10">R</tspan><tspan dy="-4" font-size="14">²</tspan></text>
  <text x="360" y="332" text-anchor="middle" font-size="13" fill="#555">=   N<tspan dy="4" font-size="9">L</tspan><tspan dy="-4" font-size="13">(τ̂</tspan><tspan dy="4" font-size="9">L</tspan><tspan dy="-4" font-size="13"> − τ̄)² + N</tspan><tspan dy="4" font-size="9">R</tspan><tspan dy="-4" font-size="13">(τ̂</tspan><tspan dy="4" font-size="9">R</tspan><tspan dy="-4" font-size="13"> − τ̄)²  +  const</tspan></text>
  <text x="360" y="358" text-anchor="middle" font-size="11.5" fill="#888">the parent term N τ̄² is fixed before the split → only the child-to-parent variance is optimized</text>

  <!-- caption -->
  <text x="360" y="396" text-anchor="middle" font-size="12" font-style="italic" fill="#666">a causal tree splits to spread τ̂ apart, where a standard tree splits to predict Y</text>
</svg>
