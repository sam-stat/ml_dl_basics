<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 470" width="860" height="470" font-family="Georgia, 'Times New Roman', serif">
  <defs>
    <filter id="rough" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="fractalNoise" baseFrequency="0.009" numOctaves="2" seed="4" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="1.4" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#777"/>
    </marker>
  </defs>
  <rect width="860" height="470" fill="#ffffff"/>
  <text x="430" y="30" text-anchor="middle" font-size="18" font-weight="bold" fill="#222">Estimation methods — three tiers</text>

  <!-- root -->
  <rect filter="url(#rough)" x="320" y="46" width="220" height="40" rx="6" fill="#f7f7f7" stroke="#999" stroke-width="1.5"/>
  <text x="430" y="71" text-anchor="middle" font-size="14" fill="#333">causal question: does X cause Y?</text>

  <!-- connectors root -> categories -->
  <path filter="url(#rough)" d="M430,86 L180,118" stroke="#777" stroke-width="1.3" fill="none" marker-end="url(#arrow)"/>
  <path filter="url(#rough)" d="M430,86 L430,118" stroke="#777" stroke-width="1.3" fill="none" marker-end="url(#arrow)"/>
  <path filter="url(#rough)" d="M430,86 L680,118" stroke="#777" stroke-width="1.3" fill="none" marker-end="url(#arrow)"/>

  <!-- category: Experimental (blue) -->
  <rect filter="url(#rough)" x="80" y="120" width="200" height="46" rx="6" fill="#eef4fb" stroke="#4f86c6" stroke-width="1.8"/>
  <text x="180" y="142" text-anchor="middle" font-size="13" font-weight="bold" fill="#2c5f93">Experimental</text>
  <text x="180" y="158" text-anchor="middle" font-size="11" fill="#2c5f93">(gold standard)</text>
  <rect filter="url(#rough)" x="90" y="195" width="180" height="26" rx="4" fill="#f6faff" stroke="#a9c7e6"/>
  <text x="180" y="212" text-anchor="middle" font-size="11" fill="#444">RCT / A-B testing</text>

  <!-- category: Quasi-experimental (amber) -->
  <rect filter="url(#rough)" x="330" y="120" width="200" height="46" rx="6" fill="#fff3cd" stroke="#f0ad4e" stroke-width="1.8"/>
  <text x="430" y="142" text-anchor="middle" font-size="13" font-weight="bold" fill="#9a6b1e">Quasi-Experimental</text>
  <text x="430" y="158" text-anchor="middle" font-size="11" fill="#9a6b1e">(observational)</text>
  <rect filter="url(#rough)" x="340" y="195" width="180" height="26" rx="4" fill="#fffdf3" stroke="#e9cf8f"/>
  <text x="430" y="212" text-anchor="middle" font-size="11" fill="#444">Difference-in-Differences</text>
  <rect filter="url(#rough)" x="340" y="229" width="180" height="26" rx="4" fill="#fffdf3" stroke="#e9cf8f"/>
  <text x="430" y="246" text-anchor="middle" font-size="11" fill="#444">Propensity Score Matching</text>
  <rect filter="url(#rough)" x="340" y="263" width="180" height="26" rx="4" fill="#fffdf3" stroke="#e9cf8f"/>
  <text x="430" y="280" text-anchor="middle" font-size="11" fill="#444">Regression Discontinuity</text>
  <rect filter="url(#rough)" x="340" y="297" width="180" height="26" rx="4" fill="#fffdf3" stroke="#e9cf8f"/>
  <text x="430" y="314" text-anchor="middle" font-size="11" fill="#444">Instrumental Variables</text>

  <!-- category: Causal ML (green) -->
  <rect filter="url(#rough)" x="580" y="120" width="200" height="46" rx="6" fill="#edfaed" stroke="#5cb85c" stroke-width="1.8"/>
  <text x="680" y="142" text-anchor="middle" font-size="13" font-weight="bold" fill="#3a8a3a">Causal ML</text>
  <text x="680" y="158" text-anchor="middle" font-size="11" fill="#3a8a3a">(per-user effect)</text>
  <rect filter="url(#rough)" x="590" y="195" width="180" height="26" rx="4" fill="#f6fdf6" stroke="#a9dba9"/>
  <text x="680" y="212" text-anchor="middle" font-size="11" fill="#444">Meta-learners (S/T/X)</text>
  <rect filter="url(#rough)" x="590" y="229" width="180" height="26" rx="4" fill="#f6fdf6" stroke="#a9dba9"/>
  <text x="680" y="246" text-anchor="middle" font-size="11" fill="#444">Causal Trees &amp; Forests</text>
  <rect filter="url(#rough)" x="590" y="263" width="180" height="26" rx="4" fill="#f6fdf6" stroke="#a9dba9"/>
  <text x="680" y="280" text-anchor="middle" font-size="11" fill="#444">Double Machine Learning</text>

  <!-- frameworks caption -->
  <text x="430" y="356" text-anchor="middle" font-size="11" fill="#888">Foundational frameworks (Potential Outcomes · SCMs &amp; DAGs) define and identify the effect — see Estimands (02)</text>

  <!-- organizing axis -->
  <path filter="url(#rough)" d="M40,400 L820,400" stroke="#bbb" stroke-width="1.2" fill="none" marker-end="url(#arrow)"/>
  <text x="40" y="392" font-size="11" fill="#777">you control assignment</text>
  <text x="820" y="392" text-anchor="end" font-size="11" fill="#777">only observational data</text>
  <text x="430" y="426" text-anchor="middle" font-size="12" fill="#555">organizing axis: population effect (ATE)  →  individual effect (CATE)</text>
  <text x="430" y="448" text-anchor="middle" font-size="11" fill="#999">each tier gives up a luxury the previous one had</text>
</svg>
