<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 580 460" width="580" height="460" font-family="Georgia, 'Times New Roman', serif">
  <rect width="580" height="460" fill="#ffffff"/>
  <text x="290" y="32" text-anchor="middle" font-size="18" font-weight="bold" fill="#222">Uplift segmentation — four user types</text>

  <!-- top axis -->
  <text x="355" y="72" text-anchor="middle" font-size="13" fill="#444">WITH message (Treatment, T = 1)</text>
  <text x="272" y="114" text-anchor="middle" font-size="12" fill="#666">Converts</text>
  <text x="437" y="114" text-anchor="middle" font-size="12" fill="#666">Ignores</text>

  <!-- left axis -->
  <text x="36" y="250" text-anchor="middle" font-size="13" fill="#444" transform="rotate(-90 36 250)">WITHOUT message (Control, T = 0)</text>
  <text x="80" y="194" text-anchor="middle" font-size="12" fill="#666">Converts</text>
  <text x="80" y="314" text-anchor="middle" font-size="12" fill="#666">Ignores</text>

  <!-- Sure Things -->
  <rect x="190" y="130" width="165" height="120" fill="#eef4fb" stroke="#4f86c6" stroke-width="1.5"/>
  <text x="272" y="180" text-anchor="middle" font-size="15" font-weight="bold" fill="#2c5f93">Sure Things</text>
  <text x="272" y="204" text-anchor="middle" font-size="11" fill="#555">convert either way</text>
  <text x="272" y="220" text-anchor="middle" font-size="11" fill="#555">don't send (wasted spend)</text>

  <!-- Sleeping Dogs -->
  <rect x="355" y="130" width="165" height="120" fill="#fdeaea" stroke="#d9534f" stroke-width="1.5"/>
  <text x="437" y="180" text-anchor="middle" font-size="15" font-weight="bold" fill="#a83a36">Sleeping Dogs</text>
  <text x="437" y="204" text-anchor="middle" font-size="11" fill="#555">message backfires</text>
  <text x="437" y="220" text-anchor="middle" font-size="11" fill="#555">strictly avoid (τ &lt; 0)</text>

  <!-- Persuadables -->
  <rect x="190" y="250" width="165" height="120" fill="#edfaed" stroke="#5cb85c" stroke-width="2.6"/>
  <text x="272" y="300" text-anchor="middle" font-size="15" font-weight="bold" fill="#3a8a3a">Persuadables</text>
  <text x="272" y="324" text-anchor="middle" font-size="11" fill="#555">convert only if nudged</text>
  <text x="272" y="340" text-anchor="middle" font-size="11" fill="#555">TARGET — the real lift</text>

  <!-- Lost Causes -->
  <rect x="355" y="250" width="165" height="120" fill="#f4f4f4" stroke="#999999" stroke-width="1.5"/>
  <text x="437" y="300" text-anchor="middle" font-size="15" font-weight="bold" fill="#666">Lost Causes</text>
  <text x="437" y="324" text-anchor="middle" font-size="11" fill="#555">never convert</text>
  <text x="437" y="340" text-anchor="middle" font-size="11" fill="#555">don't send (saves cost)</text>

  <!-- formula -->
  <text x="290" y="412" text-anchor="middle" font-size="13" fill="#333">uplift  τ(x) = P(Y = 1 | T = 1, x) − P(Y = 1 | T = 0, x)</text>
  <text x="290" y="436" text-anchor="middle" font-size="11" fill="#888">Persuadables maximize τ; Sleeping Dogs have τ &lt; 0</text>
</svg>
