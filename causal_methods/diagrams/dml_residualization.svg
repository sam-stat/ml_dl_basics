<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 440" width="700" height="440" font-family="Georgia, 'Times New Roman', serif">
  <defs>
    <marker id="dmlarr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#777"/>
    </marker>
  </defs>
  <rect width="700" height="440" fill="#ffffff"/>
  <text x="350" y="30" text-anchor="middle" font-size="18" font-weight="bold" fill="#222">Double Machine Learning — partial out, then regress</text>

  <text x="175" y="60" text-anchor="middle" font-size="13" font-weight="bold" fill="#9a6b1e">Stage 1 — predict away the confounders X</text>
  <text x="540" y="60" text-anchor="middle" font-size="13" font-weight="bold" fill="#a83a36">Stage 2 — regress the surprises</text>
  <line x1="350" y1="74" x2="350" y2="380" stroke="#e3e3e3" stroke-width="1"/>

  <!-- data -->
  <rect x="100" y="84" width="150" height="34" rx="5" fill="#eef4fb" stroke="#4f86c6" stroke-width="1.5"/>
  <text x="175" y="106" text-anchor="middle" font-size="12" fill="#2c5f93">data  (X, T, Y)</text>

  <path d="M150,118 L100,150" stroke="#777" stroke-width="1.3" marker-end="url(#dmlarr)"/>
  <path d="M200,118 L250,150" stroke="#777" stroke-width="1.3" marker-end="url(#dmlarr)"/>

  <!-- outcome model -->
  <rect x="28" y="152" width="148" height="34" rx="5" fill="#edfaed" stroke="#5cb85c" stroke-width="1.5"/>
  <text x="102" y="174" text-anchor="middle" font-size="12" fill="#3a8a3a">m(X) = E[Y | X]</text>
  <!-- treatment model -->
  <rect x="184" y="152" width="148" height="34" rx="5" fill="#edfaed" stroke="#5cb85c" stroke-width="1.5"/>
  <text x="258" y="174" text-anchor="middle" font-size="12" fill="#3a8a3a">e(X) = E[T | X]</text>

  <path d="M102,186 L102,218" stroke="#777" stroke-width="1.3" marker-end="url(#dmlarr)"/>
  <path d="M258,186 L258,218" stroke="#777" stroke-width="1.3" marker-end="url(#dmlarr)"/>

  <!-- residuals -->
  <rect x="20" y="220" width="164" height="40" rx="5" fill="#fff3cd" stroke="#f0ad4e" stroke-width="1.4"/>
  <text x="102" y="238" text-anchor="middle" font-size="12" fill="#9a6b1e">outcome residual</text>
  <text x="102" y="253" text-anchor="middle" font-size="12" fill="#9a6b1e">Ỹ = Y − m(X)</text>
  <rect x="194" y="220" width="148" height="40" rx="5" fill="#fff3cd" stroke="#f0ad4e" stroke-width="1.4"/>
  <text x="268" y="238" text-anchor="middle" font-size="12" fill="#9a6b1e">treatment residual</text>
  <text x="268" y="253" text-anchor="middle" font-size="12" fill="#9a6b1e">T̃ = T − e(X)</text>

  <!-- cross to stage 2 -->
  <path d="M184,240 C 360,240 360,250 430,255" stroke="#777" stroke-width="1.3" fill="none" marker-end="url(#dmlarr)"/>
  <path d="M342,240 C 400,240 410,300 432,308" stroke="#777" stroke-width="1.3" fill="none" marker-end="url(#dmlarr)"/>

  <!-- stage 2 mini-plot -->
  <line x1="440" y1="330" x2="650" y2="330" stroke="#555" stroke-width="1.3"/>
  <line x1="440" y1="330" x2="440" y2="150" stroke="#555" stroke-width="1.3"/>
  <text x="545" y="356" text-anchor="middle" font-size="11" fill="#444">treatment residual  T̃</text>
  <text x="412" y="245" text-anchor="middle" font-size="11" fill="#444" transform="rotate(-90 412 245)">outcome residual  Ỹ</text>
  <!-- points -->
  <circle cx="470" cy="305" r="3" fill="#4f86c6"/>
  <circle cx="500" cy="288" r="3" fill="#4f86c6"/>
  <circle cx="525" cy="262" r="3" fill="#4f86c6"/>
  <circle cx="560" cy="244" r="3" fill="#4f86c6"/>
  <circle cx="585" cy="222" r="3" fill="#4f86c6"/>
  <circle cx="615" cy="198" r="3" fill="#4f86c6"/>
  <circle cx="545" cy="270" r="3" fill="#4f86c6"/>
  <circle cx="495" cy="300" r="3" fill="#4f86c6"/>
  <!-- fit line -->
  <line x1="455" y1="312" x2="630" y2="190" stroke="#d9534f" stroke-width="2.4"/>
  <text x="600" y="222" font-size="12" fill="#a83a36">slope = τ</text>

  <!-- footer formula -->
  <line x1="40" y1="392" x2="660" y2="392" stroke="#eee" stroke-width="1"/>
  <text x="350" y="420" text-anchor="middle" font-size="13" fill="#333">θ̂ = arg min Σ ( Ỹ − θ · T̃ )²    (Frisch–Waugh–Lovell / R-learner)</text>
</svg>
