<svg width="720" height="270" viewBox="0 0 720 270" xmlns="http://www.w3.org/2000/svg" font-family="Georgia, 'Times New Roman', serif">
  <defs>
    <marker id="a"  markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto"><polygon points="0 0,9 3.5,0 7" fill="#555"/></marker>
    <marker id="ab" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto"><polygon points="0 0,9 3.5,0 7" fill="#4f86c6"/></marker>
  </defs>
  <rect width="720" height="270" fill="#fff"/>
  <text x="360" y="26" text-anchor="middle" font-size="15" font-weight="bold" fill="#222">RNN — Unrolled Through Time</text>

  <!-- h0 init -->
  <rect x="14" y="76" width="76" height="60" rx="6" fill="#f5f5f5" stroke="#bbb" stroke-width="1.5"/>
  <text x="52" y="106" text-anchor="middle" font-size="14" font-style="italic" fill="#888">h<tspan dy="5" font-size="9">0</tspan></text>
  <text x="52" y="126" text-anchor="middle" font-size="10" fill="#bbb">(zeros)</text>

  <!-- RNN Cell t=1 -->
  <rect x="134" y="60" width="170" height="92" rx="7" fill="#edfaed" stroke="#5cb85c" stroke-width="2"/>
  <text x="219" y="86" text-anchor="middle" font-size="12" font-weight="bold" fill="#2d7a2d">RNN Cell  t = 1</text>
  <text x="219" y="112" text-anchor="middle" font-size="11" fill="#333">h<tspan dy="5" font-size="8">1</tspan><tspan dy="-5" font-size="11"> = tanh(W</tspan><tspan dy="5" font-size="8">h</tspan><tspan dy="-5" font-size="11">h</tspan><tspan dy="5" font-size="8">0</tspan><tspan dy="-5" font-size="11"> + W</tspan><tspan dy="5" font-size="8">x</tspan><tspan dy="-5" font-size="11">x</tspan><tspan dy="5" font-size="8">1</tspan><tspan dy="-5" font-size="11">)</tspan></text>

  <!-- RNN Cell t=2 -->
  <rect x="352" y="60" width="170" height="92" rx="7" fill="#edfaed" stroke="#5cb85c" stroke-width="2"/>
  <text x="437" y="86" text-anchor="middle" font-size="12" font-weight="bold" fill="#2d7a2d">RNN Cell  t = 2</text>
  <text x="437" y="112" text-anchor="middle" font-size="11" fill="#333">h<tspan dy="5" font-size="8">2</tspan><tspan dy="-5" font-size="11"> = tanh(W</tspan><tspan dy="5" font-size="8">h</tspan><tspan dy="-5" font-size="11">h</tspan><tspan dy="5" font-size="8">1</tspan><tspan dy="-5" font-size="11"> + W</tspan><tspan dy="5" font-size="8">x</tspan><tspan dy="-5" font-size="11">x</tspan><tspan dy="5" font-size="8">2</tspan><tspan dy="-5" font-size="11">)</tspan></text>

  <!-- RNN Cell t=3 -->
  <rect x="570" y="60" width="136" height="92" rx="7" fill="#edfaed" stroke="#5cb85c" stroke-width="2"/>
  <text x="638" y="86" text-anchor="middle" font-size="12" font-weight="bold" fill="#2d7a2d">RNN Cell  t = 3</text>
  <text x="638" y="112" text-anchor="middle" font-size="11" fill="#333">h<tspan dy="5" font-size="8">3</tspan><tspan dy="-5" font-size="11"> = tanh(…)</tspan></text>

  <!-- h arrows horizontal -->
  <line x1="90"  y1="106" x2="130" y2="106" stroke="#4f86c6" stroke-width="2" marker-end="url(#ab)"/>
  <line x1="304" y1="106" x2="348" y2="106" stroke="#4f86c6" stroke-width="2" marker-end="url(#ab)"/>
  <line x1="522" y1="106" x2="566" y2="106" stroke="#4f86c6" stroke-width="2" marker-end="url(#ab)"/>
  <line x1="706" y1="106" x2="718" y2="106" stroke="#d9534f" stroke-width="2" marker-end="url(#a)"/>

  <!-- Arrow labels -->
  <text x="110" y="99" text-anchor="middle" font-size="12" font-style="italic" fill="#4f86c6">h<tspan dy="5" font-size="8">0</tspan></text>
  <text x="326" y="99" text-anchor="middle" font-size="12" font-style="italic" fill="#4f86c6">h<tspan dy="5" font-size="8">1</tspan></text>
  <text x="544" y="99" text-anchor="middle" font-size="12" font-style="italic" fill="#4f86c6">h<tspan dy="5" font-size="8">2</tspan></text>

  <!-- x inputs from below -->
  <line x1="219" y1="188" x2="219" y2="155" stroke="#888" stroke-width="1.5" marker-end="url(#a)"/>
  <text x="219" y="204" text-anchor="middle" font-size="14" font-style="italic" fill="#555">x<tspan dy="5" font-size="9">1</tspan></text>
  <line x1="437" y1="188" x2="437" y2="155" stroke="#888" stroke-width="1.5" marker-end="url(#a)"/>
  <text x="437" y="204" text-anchor="middle" font-size="14" font-style="italic" fill="#555">x<tspan dy="5" font-size="9">2</tspan></text>
  <line x1="638" y1="188" x2="638" y2="155" stroke="#888" stroke-width="1.5" marker-end="url(#a)"/>
  <text x="638" y="204" text-anchor="middle" font-size="14" font-style="italic" fill="#555">x<tspan dy="5" font-size="9">3</tspan></text>

  <!-- Shared weights note -->
  <rect x="100" y="226" width="520" height="30" rx="4" fill="#fffde7" stroke="#f0ad4e" stroke-width="1"/>
  <text x="360" y="246" text-anchor="middle" font-size="11" fill="#7d5c00">⚠  W<tspan dy="5" font-size="8">h</tspan><tspan dy="-5" font-size="11">,  W</tspan><tspan dy="5" font-size="8">x</tspan><tspan dy="-5" font-size="11">,  b  are shared across all time steps — not separate per step</tspan></text>
</svg>
