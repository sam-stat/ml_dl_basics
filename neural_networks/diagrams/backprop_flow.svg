<svg width="740" height="280" viewBox="0 0 740 280" xmlns="http://www.w3.org/2000/svg" font-family="Georgia, 'Times New Roman', serif">
  <defs>
    <marker id="ab" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <polygon points="0 0,9 3.5,0 7" fill="#4f86c6"/>
    </marker>
    <marker id="ar" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <polygon points="0 0,9 3.5,0 7" fill="#d9534f"/>
    </marker>
  </defs>
  <rect width="740" height="280" fill="#fff"/>
  <text x="370" y="27" text-anchor="middle" font-size="15" font-weight="bold" fill="#222">Forward Pass  &amp;  Backpropagation</text>

  <!-- Input box -->
  <rect x="14" y="74" width="120" height="80" rx="6" fill="#eef4fb" stroke="#4f86c6" stroke-width="2"/>
  <text x="74" y="108" text-anchor="middle" font-size="13" font-weight="bold" fill="#2c5f9e">Input</text>
  <text x="74" y="128" text-anchor="middle" font-size="13" font-style="italic" fill="#555">x ∈ ℝ<tspan dy="-6" font-size="9">n</tspan></text>

  <!-- Layer 1 box -->
  <rect x="196" y="60" width="168" height="108" rx="6" fill="#edfaed" stroke="#5cb85c" stroke-width="2"/>
  <text x="280" y="90" text-anchor="middle" font-size="11" font-weight="bold" fill="#2d7a2d">Layer  ℓ = 1</text>
  <text x="280" y="112" text-anchor="middle" font-size="11" fill="#333">z<tspan dy="-6" font-size="8">(1)</tspan><tspan dy="6" font-size="11"> = W</tspan><tspan dy="-6" font-size="8">(1)</tspan><tspan dy="6" font-size="11">x + b</tspan><tspan dy="-6" font-size="8">(1)</tspan></text>
  <text x="280" y="134" text-anchor="middle" font-size="11" fill="#333">a<tspan dy="-6" font-size="8">(1)</tspan><tspan dy="6" font-size="11"> = σ(z</tspan><tspan dy="-6" font-size="8">(1)</tspan><tspan dy="6" font-size="11">)</tspan></text>

  <!-- Layer 2 box -->
  <rect x="428" y="60" width="168" height="108" rx="6" fill="#edfaed" stroke="#5cb85c" stroke-width="2"/>
  <text x="512" y="90" text-anchor="middle" font-size="11" font-weight="bold" fill="#2d7a2d">Layer  ℓ = 2</text>
  <text x="512" y="112" text-anchor="middle" font-size="11" fill="#333">z<tspan dy="-6" font-size="8">(2)</tspan><tspan dy="6" font-size="11"> = W</tspan><tspan dy="-6" font-size="8">(2)</tspan><tspan dy="6" font-size="11">a</tspan><tspan dy="-6" font-size="8">(1)</tspan><tspan dy="6" font-size="11"> + b</tspan><tspan dy="-6" font-size="8">(2)</tspan></text>
  <text x="512" y="134" text-anchor="middle" font-size="11" fill="#333">a<tspan dy="-6" font-size="8">(2)</tspan><tspan dy="6" font-size="11"> = σ(z</tspan><tspan dy="-6" font-size="8">(2)</tspan><tspan dy="6" font-size="11">)</tspan></text>

  <!-- Loss box -->
  <rect x="660" y="74" width="66" height="80" rx="6" fill="#fdeaea" stroke="#d9534f" stroke-width="2"/>
  <text x="693" y="108" text-anchor="middle" font-size="12" font-weight="bold" fill="#9e2c2c">Loss</text>
  <text x="693" y="128" text-anchor="middle" font-size="12" font-style="italic" fill="#555">ℒ(ŷ, y)</text>

  <!-- Forward arrows (top) -->
  <line x1="134" y1="100" x2="192" y2="100" stroke="#4f86c6" stroke-width="2" marker-end="url(#ab)"/>
  <line x1="364" y1="100" x2="424" y2="100" stroke="#4f86c6" stroke-width="2" marker-end="url(#ab)"/>
  <line x1="596" y1="100" x2="657" y2="100" stroke="#4f86c6" stroke-width="2" marker-end="url(#ab)"/>
  <text x="370" y="52" text-anchor="middle" font-size="11" fill="#4f86c6" font-weight="bold">▶  Forward Pass — compute a<tspan dy="-6" font-size="8">(ℓ)</tspan><tspan dy="6" font-size="11">,  obtain  ℒ</tspan></text>

  <!-- Backward arrows (bottom) -->
  <line x1="192" y1="148" x2="134" y2="148" stroke="#d9534f" stroke-width="2" marker-end="url(#ar)"/>
  <line x1="424" y1="148" x2="364" y2="148" stroke="#d9534f" stroke-width="2" marker-end="url(#ar)"/>
  <line x1="657" y1="148" x2="596" y2="148" stroke="#d9534f" stroke-width="2" marker-end="url(#ar)"/>

  <!-- Gradient labels under backward arrows -->
  <text x="163" y="172" text-anchor="middle" font-size="10" fill="#d9534f">∂ℒ / ∂W<tspan dy="-6" font-size="8">(1)</tspan></text>
  <text x="394" y="172" text-anchor="middle" font-size="10" fill="#d9534f">∂ℒ / ∂W<tspan dy="-6" font-size="8">(2)</tspan></text>
  <text x="627" y="172" text-anchor="middle" font-size="10" fill="#d9534f">∂ℒ / ∂a<tspan dy="-6" font-size="8">(2)</tspan></text>

  <!-- Backward label -->
  <text x="370" y="196" text-anchor="middle" font-size="11" fill="#d9534f" font-weight="bold">◀  Backward Pass — chain rule:  ∂ℒ/∂W<tspan dy="-6" font-size="8">(ℓ)</tspan><tspan dy="6" font-size="11"> = δ</tspan><tspan dy="-6" font-size="8">(ℓ)</tspan><tspan dy="6" font-size="11"> (a</tspan><tspan dy="-6" font-size="8">(ℓ−1)</tspan><tspan dy="6" font-size="11">)</tspan><tspan dy="-6" font-size="8">⊤</tspan></text>

  <!-- SGD update rule -->
  <rect x="160" y="214" width="420" height="34" rx="4" fill="#fafafa" stroke="#e0e0e0" stroke-width="1"/>
  <text x="370" y="235" text-anchor="middle" font-size="11" fill="#444">Update:  W<tspan dy="-6" font-size="8">(ℓ)</tspan><tspan dy="6" font-size="11"> ← W</tspan><tspan dy="-6" font-size="8">(ℓ)</tspan><tspan dy="6" font-size="11"> − η · ∂ℒ/∂W</tspan><tspan dy="-6" font-size="8">(ℓ)</tspan><tspan dy="6" font-size="11">   (η = learning rate)</tspan></text>
</svg>
