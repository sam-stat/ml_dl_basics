<svg width="900" height="620" viewBox="0 0 900 620" xmlns="http://www.w3.org/2000/svg" font-family="Georgia, 'Times New Roman', serif">
  <rect width="900" height="620" fill="#fff"/>
  <text x="450" y="30" text-anchor="middle" font-size="16" font-weight="bold" fill="#222">Architecture Selection Guide</text>
  <text x="450" y="50" text-anchor="middle" font-size="11" fill="#888">Which neural network architecture to use for each problem type</text>

  <!-- Table header -->
  <rect x="10" y="60" width="880" height="38" rx="4" fill="#2c3e50"/>
  <text x="100" y="84" text-anchor="middle" font-size="12" font-weight="bold" fill="#fff">Task</text>
  <text x="270" y="84" text-anchor="middle" font-size="12" font-weight="bold" fill="#fff">Input</text>
  <text x="430" y="84" text-anchor="middle" font-size="12" font-weight="bold" fill="#fff">Architecture</text>
  <text x="630" y="84" text-anchor="middle" font-size="12" font-weight="bold" fill="#fff">Key Reason</text>
  <text x="808" y="84" text-anchor="middle" font-size="12" font-weight="bold" fill="#fff">Example</text>

  <!-- Column dividers in header -->
  <line x1="188" y1="60" x2="188" y2="98" stroke="#445" stroke-width="1"/>
  <line x1="350" y1="60" x2="350" y2="98" stroke="#445" stroke-width="1"/>
  <line x1="508" y1="60" x2="508" y2="98" stroke="#445" stroke-width="1"/>
  <line x1="720" y1="60" x2="720" y2="98" stroke="#445" stroke-width="1"/>

  <!-- Row 1: Image Classification -->
  <rect x="10" y="98" width="880" height="48" fill="#dce8fa"/>
  <text x="99" y="116" text-anchor="middle" font-size="12" font-weight="bold" fill="#1a3a5c">Image Classification</text>
  <text x="99" y="133" text-anchor="middle" font-size="10" fill="#444">e.g. cat vs dog</text>
  <text x="269" y="125" text-anchor="middle" font-size="11" fill="#333">Image (H×W×C)</text>
  <rect x="358" y="106" width="142" height="26" rx="3" fill="#4f86c6"/>
  <text x="429" y="124" text-anchor="middle" font-size="12" font-weight="bold" fill="#fff">CNN</text>
  <text x="614" y="116" text-anchor="middle" font-size="11" fill="#333">Spatial locality, weight sharing</text>
  <text x="614" y="133" text-anchor="middle" font-size="10" fill="#666">filters: edges → shapes → objects</text>
  <text x="808" y="125" text-anchor="middle" font-size="10" fill="#555">ResNet, EfficientNet</text>

  <!-- Row 2: Object Detection -->
  <rect x="10" y="146" width="880" height="48" fill="#f5f5f5"/>
  <text x="99" y="164" text-anchor="middle" font-size="12" font-weight="bold" fill="#1a3a5c">Object Detection</text>
  <text x="99" y="181" text-anchor="middle" font-size="10" fill="#444">e.g. bounding boxes</text>
  <text x="269" y="173" text-anchor="middle" font-size="11" fill="#333">Image (H×W×C)</text>
  <rect x="342" y="154" width="174" height="26" rx="3" fill="#4f86c6"/>
  <text x="429" y="172" text-anchor="middle" font-size="12" font-weight="bold" fill="#fff">CNN + Region Head</text>
  <text x="614" y="164" text-anchor="middle" font-size="11" fill="#333">Multi-scale feature maps</text>
  <text x="614" y="181" text-anchor="middle" font-size="10" fill="#666">backbone CNN + detection head</text>
  <text x="808" y="173" text-anchor="middle" font-size="10" fill="#555">YOLO, Faster R-CNN</text>

  <!-- Row 3: NER -->
  <rect x="10" y="194" width="880" height="48" fill="#e8f8e8"/>
  <text x="99" y="212" text-anchor="middle" font-size="12" font-weight="bold" fill="#1a3c1a">Named Entity Recog.</text>
  <text x="99" y="229" text-anchor="middle" font-size="10" fill="#444">e.g. John [PER]</text>
  <text x="269" y="221" text-anchor="middle" font-size="11" fill="#333">Token sequence</text>
  <rect x="332" y="202" width="194" height="26" rx="3" fill="#27ae60"/>
  <text x="429" y="220" text-anchor="middle" font-size="12" font-weight="bold" fill="#fff">BiLSTM-CRF  /  BERT</text>
  <text x="614" y="212" text-anchor="middle" font-size="11" fill="#333">Bidirectional context per token</text>
  <text x="614" y="229" text-anchor="middle" font-size="10" fill="#666">CRF models label transitions</text>
  <text x="808" y="221" text-anchor="middle" font-size="10" fill="#555">spaCy, BERT-NER</text>

  <!-- Row 4: Text Classification -->
  <rect x="10" y="242" width="880" height="48" fill="#f5f5f5"/>
  <text x="99" y="260" text-anchor="middle" font-size="12" font-weight="bold" fill="#1a3c1a">Text Classification</text>
  <text x="99" y="277" text-anchor="middle" font-size="10" fill="#444">e.g. sentiment, spam</text>
  <text x="269" y="269" text-anchor="middle" font-size="11" fill="#333">Text sequence</text>
  <rect x="326" y="250" width="206" height="26" rx="3" fill="#27ae60"/>
  <text x="429" y="268" text-anchor="middle" font-size="12" font-weight="bold" fill="#fff">BERT  /  CNN  /  LSTM</text>
  <text x="614" y="260" text-anchor="middle" font-size="11" fill="#333">Global context or local n-grams</text>
  <text x="614" y="277" text-anchor="middle" font-size="10" fill="#666">BERT ≫ LSTM ≫ CNN accuracy</text>
  <text x="808" y="269" text-anchor="middle" font-size="10" fill="#555">BERT fine-tune</text>

  <!-- Row 5: Seq-to-Seq -->
  <rect x="10" y="290" width="880" height="48" fill="#fef9e7"/>
  <text x="99" y="308" text-anchor="middle" font-size="12" font-weight="bold" fill="#3d2b00">Seq-to-Seq</text>
  <text x="99" y="325" text-anchor="middle" font-size="10" fill="#444">e.g. EN → FR</text>
  <text x="269" y="317" text-anchor="middle" font-size="11" fill="#333">Source sequence</text>
  <rect x="316" y="298" width="226" height="26" rx="3" fill="#f39c12"/>
  <text x="429" y="316" text-anchor="middle" font-size="12" font-weight="bold" fill="#fff">Transformer  Enc–Dec</text>
  <text x="614" y="308" text-anchor="middle" font-size="11" fill="#333">Attention over full source</text>
  <text x="614" y="325" text-anchor="middle" font-size="10" fill="#666">Encoder reads; decoder attends</text>
  <text x="808" y="317" text-anchor="middle" font-size="10" fill="#555">T5, BART, mT5</text>

  <!-- Row 6: Language Modeling -->
  <rect x="10" y="338" width="880" height="48" fill="#f5f5f5"/>
  <text x="99" y="356" text-anchor="middle" font-size="12" font-weight="bold" fill="#3d2b00">Language Modelling</text>
  <text x="99" y="373" text-anchor="middle" font-size="10" fill="#444">e.g. next-token pred.</text>
  <text x="269" y="365" text-anchor="middle" font-size="11" fill="#333">Token sequence</text>
  <rect x="316" y="346" width="226" height="26" rx="3" fill="#f39c12"/>
  <text x="429" y="364" text-anchor="middle" font-size="12" font-weight="bold" fill="#fff">Transformer Decoder (GPT)</text>
  <text x="614" y="356" text-anchor="middle" font-size="11" fill="#333">Causal left-to-right attention</text>
  <text x="614" y="373" text-anchor="middle" font-size="10" fill="#666">Masked self-attn: no future tokens</text>
  <text x="808" y="365" text-anchor="middle" font-size="10" fill="#555">GPT-2/3/4, LLaMA</text>

  <!-- Row 7: Time Series -->
  <rect x="10" y="386" width="880" height="48" fill="#fdf2f2"/>
  <text x="99" y="404" text-anchor="middle" font-size="12" font-weight="bold" fill="#5c1a1a">Time Series</text>
  <text x="99" y="421" text-anchor="middle" font-size="10" fill="#444">e.g. demand forecast</text>
  <text x="269" y="413" text-anchor="middle" font-size="11" fill="#333">Numeric sequence</text>
  <rect x="316" y="394" width="226" height="26" rx="3" fill="#d9534f"/>
  <text x="429" y="412" text-anchor="middle" font-size="12" font-weight="bold" fill="#fff">LSTM  /  Transformer</text>
  <text x="614" y="404" text-anchor="middle" font-size="11" fill="#333">Temporal state or attention</text>
  <text x="614" y="421" text-anchor="middle" font-size="10" fill="#666">LSTM moderate; Trans. long-range</text>
  <text x="808" y="413" text-anchor="middle" font-size="10" fill="#555">Temporal Fusion Trans.</text>

  <!-- Row 8: Question Answering -->
  <rect x="10" y="434" width="880" height="48" fill="#f5f5f5"/>
  <text x="99" y="452" text-anchor="middle" font-size="12" font-weight="bold" fill="#1a3c1a">Question Answering</text>
  <text x="99" y="469" text-anchor="middle" font-size="10" fill="#444">e.g. extractive QA</text>
  <text x="269" y="461" text-anchor="middle" font-size="11" fill="#333">[Question, Context]</text>
  <rect x="340" y="442" width="178" height="26" rx="3" fill="#27ae60"/>
  <text x="429" y="460" text-anchor="middle" font-size="12" font-weight="bold" fill="#fff">BERT + Span Head</text>
  <text x="614" y="452" text-anchor="middle" font-size="11" fill="#333">Bidirectional understanding</text>
  <text x="614" y="469" text-anchor="middle" font-size="10" fill="#666">Predicts start/end span in context</text>
  <text x="808" y="461" text-anchor="middle" font-size="10" fill="#555">BERT-large (SQuAD)</text>

  <!-- Row 9: Semantic Search -->
  <rect x="10" y="482" width="880" height="48" fill="#f2f9fd"/>
  <text x="99" y="500" text-anchor="middle" font-size="12" font-weight="bold" fill="#1a3a5c">Semantic Search</text>
  <text x="99" y="517" text-anchor="middle" font-size="10" fill="#444">e.g. RAG retrieval</text>
  <text x="269" y="509" text-anchor="middle" font-size="11" fill="#333">Text</text>
  <rect x="316" y="490" width="226" height="26" rx="3" fill="#5bc0de"/>
  <text x="429" y="508" text-anchor="middle" font-size="12" font-weight="bold" fill="#fff">Bi-encoder  (SBERT)</text>
  <text x="614" y="500" text-anchor="middle" font-size="11" fill="#333">Dense vector similarity</text>
  <text x="614" y="517" text-anchor="middle" font-size="10" fill="#666">Encode query &amp; docs; cosine sim.</text>
  <text x="808" y="509" text-anchor="middle" font-size="10" fill="#555">FAISS, Pinecone</text>

  <!-- Column dividers -->
  <g stroke="#ddd" stroke-width="1">
    <line x1="188" y1="98" x2="188" y2="530"/>
    <line x1="350" y1="98" x2="350" y2="530"/>
    <line x1="508" y1="98" x2="508" y2="530"/>
    <line x1="720" y1="98" x2="720" y2="530"/>
  </g>
  <!-- Row dividers -->
  <g stroke="#ddd" stroke-width="0.8">
    <line x1="10" y1="146" x2="890" y2="146"/>
    <line x1="10" y1="194" x2="890" y2="194"/>
    <line x1="10" y1="242" x2="890" y2="242"/>
    <line x1="10" y1="290" x2="890" y2="290"/>
    <line x1="10" y1="338" x2="890" y2="338"/>
    <line x1="10" y1="386" x2="890" y2="386"/>
    <line x1="10" y1="434" x2="890" y2="434"/>
    <line x1="10" y1="482" x2="890" y2="482"/>
  </g>
  <rect x="10" y="98" width="880" height="432" fill="none" stroke="#bbb" stroke-width="1.5"/>

  <!-- Rule of Thumb -->
  <rect x="10" y="542" width="880" height="68" rx="5" fill="#fafafa" stroke="#e0e0e0" stroke-width="1"/>
  <text x="450" y="562" text-anchor="middle" font-size="12" font-weight="bold" fill="#333">Rule of Thumb</text>
  <text x="450" y="582" text-anchor="middle" font-size="11" fill="#555">Image  →  CNN.   Text/sequence  →  BERT or Transformer  (LSTM if low resources).</text>
  <text x="450" y="600" text-anchor="middle" font-size="11" fill="#555">Token-level  →  BiLSTM-CRF / BERT token head.   Generation  →  Transformer decoder (GPT-style).</text>
</svg>
