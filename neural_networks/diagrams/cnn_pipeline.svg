<svg width="780" height="270" viewBox="0 0 780 270" xmlns="http://www.w3.org/2000/svg" font-family="Georgia, 'Times New Roman', serif">
  <defs>
    <marker id="a" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <polygon points="0 0,9 3.5,0 7" fill="#333"/>
    </marker>
  </defs>
  <rect width="780" height="270" fill="#fff"/>
  <text x="390" y="26" text-anchor="middle" font-size="15" font-weight="bold" fill="#222">CNN Architecture — Image Classification</text>

  <!-- Input image block -->
  <polygon points="18,78 64,78 64,172 18,172" fill="#dce8fa" stroke="#4f86c6" stroke-width="1.5"/>
  <polygon points="64,78 80,62 80,156 64,172" fill="#b8d0f0" stroke="#4f86c6" stroke-width="1.5"/>
  <polygon points="18,78 64,78 80,62 34,62" fill="#c8daf5" stroke="#4f86c6" stroke-width="1.5"/>
  <text x="48" y="132" text-anchor="middle" font-size="10" fill="#2c5f9e">Input</text>
  <text x="48" y="148" text-anchor="middle" font-size="9" fill="#888">H×W×C</text>
  <line x1="80" y1="111" x2="102" y2="111" stroke="#333" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- Conv1 stack -->
  <polygon points="102,66 154,66 154,164 102,164" fill="#c8f0c8" stroke="#5cb85c" stroke-width="1.5"/>
  <polygon points="154,66 170,50 170,148 154,164" fill="#a8e8a8" stroke="#5cb85c" stroke-width="1.5"/>
  <polygon points="102,66 154,66 170,50 116,50" fill="#b8ebb8" stroke="#5cb85c" stroke-width="1.5"/>
  <polygon points="110,58 162,58 178,42 124,42" fill="#e8f8e8" stroke="#5cb85c" stroke-width="1"/>
  <text x="136" y="118" text-anchor="middle" font-size="10" fill="#2d7a2d">Conv</text>
  <text x="136" y="132" text-anchor="middle" font-size="9" fill="#2d7a2d">+ReLU</text>
  <text x="136" y="183" text-anchor="middle" font-size="9" fill="#888">k filters</text>
  <line x1="178" y1="98" x2="200" y2="98" stroke="#333" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- MaxPool1 -->
  <polygon points="200,82 236,82 236,156 200,156" fill="#fff3c8" stroke="#f0ad4e" stroke-width="1.5"/>
  <polygon points="236,82 252,66 252,140 236,156" fill="#ffe8a8" stroke="#f0ad4e" stroke-width="1.5"/>
  <polygon points="200,82 236,82 252,66 214,66" fill="#ffecb8" stroke="#f0ad4e" stroke-width="1.5"/>
  <text x="226" y="118" text-anchor="middle" font-size="9" fill="#7d5c00">Max</text>
  <text x="226" y="132" text-anchor="middle" font-size="9" fill="#7d5c00">Pool</text>
  <text x="226" y="183" text-anchor="middle" font-size="9" fill="#888">↓ spatial</text>
  <line x1="252" y1="98" x2="274" y2="98" stroke="#333" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- Conv2 deeper stack -->
  <polygon points="274,56 334,56 334,164 274,164" fill="#c8f0c8" stroke="#5cb85c" stroke-width="1.5"/>
  <polygon points="334,56 352,40 352,148 334,164" fill="#a8e8a8" stroke="#5cb85c" stroke-width="1.5"/>
  <polygon points="274,56 334,56 352,40 290,40" fill="#b8ebb8" stroke="#5cb85c" stroke-width="1.5"/>
  <polygon points="282,48 342,48 360,32 298,32" fill="#e8f8e8" stroke="#5cb85c" stroke-width="1"/>
  <polygon points="290,40 350,40 368,24 308,24" fill="#f2fcf2" stroke="#5cb85c" stroke-width="0.8"/>
  <text x="313" y="112" text-anchor="middle" font-size="10" fill="#2d7a2d">Conv</text>
  <text x="313" y="126" text-anchor="middle" font-size="9" fill="#2d7a2d">+ReLU</text>
  <text x="313" y="183" text-anchor="middle" font-size="9" fill="#888">2k filters</text>
  <line x1="368" y1="98" x2="390" y2="98" stroke="#333" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- MaxPool2 -->
  <polygon points="390,80 426,80 426,148 390,148" fill="#fff3c8" stroke="#f0ad4e" stroke-width="1.5"/>
  <polygon points="426,80 442,64 442,132 426,148" fill="#ffe8a8" stroke="#f0ad4e" stroke-width="1.5"/>
  <polygon points="390,80 426,80 442,64 404,64" fill="#ffecb8" stroke="#f0ad4e" stroke-width="1.5"/>
  <text x="416" y="113" text-anchor="middle" font-size="9" fill="#7d5c00">Max</text>
  <text x="416" y="127" text-anchor="middle" font-size="9" fill="#7d5c00">Pool</text>
  <line x1="442" y1="98" x2="464" y2="98" stroke="#333" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- Flatten -->
  <rect x="464" y="80" width="68" height="36" rx="4" fill="#f2f9fd" stroke="#5bc0de" stroke-width="1.5"/>
  <text x="498" y="96" text-anchor="middle" font-size="10" fill="#1a7a9a">Flatten</text>
  <text x="498" y="110" text-anchor="middle" font-size="9" fill="#888">3D → 1D</text>
  <line x1="532" y1="98" x2="554" y2="98" stroke="#333" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- FC -->
  <rect x="554" y="74" width="70" height="48" rx="4" fill="#fdeaea" stroke="#d9534f" stroke-width="1.5"/>
  <text x="589" y="95" text-anchor="middle" font-size="10" fill="#9e2c2c">Fully</text>
  <text x="589" y="109" text-anchor="middle" font-size="10" fill="#9e2c2c">Connected</text>
  <text x="589" y="142" text-anchor="middle" font-size="9" fill="#888">+ReLU</text>
  <line x1="624" y1="98" x2="648" y2="98" stroke="#333" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- Softmax output -->
  <rect x="648" y="74" width="110" height="48" rx="4" fill="#fdeaea" stroke="#d9534f" stroke-width="2"/>
  <text x="703" y="95" text-anchor="middle" font-size="11" font-weight="bold" fill="#9e2c2c">Softmax</text>
  <text x="703" y="112" text-anchor="middle" font-size="10" fill="#555">P(class | x)</text>
  <text x="703" y="142" text-anchor="middle" font-size="9" fill="#888">k classes</text>

  <!-- Formula note -->
  <rect x="18" y="200" width="744" height="56" rx="4" fill="#fafafa" stroke="#e0e0e0" stroke-width="1"/>
  <text x="390" y="220" text-anchor="middle" font-size="11" fill="#333">Convolution:  S(i, j) = Σ<tspan dy="5" font-size="8">m, n</tspan><tspan dy="-5" font-size="11">  I(i+m, j+n) · K(m, n)  —  same filter K at every position (weight sharing)</tspan></text>
  <text x="390" y="243" text-anchor="middle" font-size="10" fill="#888">Output size:  H<tspan dy="5" font-size="8">out</tspan><tspan dy="-5" font-size="10"> = ⌊(H + 2p − k) / s⌋ + 1</tspan></text>
</svg>
