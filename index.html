<style>
/* ── Design tokens ── */
:root {
  --sidebar-w:       268px;
  --sidebar-bg:      #0a2e18;
  --sidebar-hover:   #12401f;
  --sidebar-text:    #86efac;
  --sidebar-dim:     rgba(134,239,172,0.45);

  --sidebar-active-border: #22c55e;
  --sidebar-active-text:   #4ade80;

  --border:  #d1fae5;

  --text:       #111827;
  --text-muted: #4b5563;

  --accent:       #16a34a;

  --code-bg:    #f0fdf4;

}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }

body {

  background: var(--bg);

  display: flex;

  font-size: 16px;

}

/* ════════════════════════════════════════
   SIDEBAR
════════════════════════════════════════ */
.sidebar {
  position: fixed;
  top: 0; left: 0; bottom: 0;
  width: var(--sidebar-w);
  background: var(--sidebar-bg);
  overflow-y: auto;

}
.sidebar-brand:hover { background: var(--sidebar-hover); }
.sidebar-brand h1 {

}
.sidebar-brand p {
  font-size: 0.7rem;

/* Collapsible section group */

.nav-group-header {

.nav-group-body { display: none; padding: 4px 0 8px; }

<script>
/* ════════════════════════════════════════
   Site data — extend this to add new sections
════════════════════════════════════════ */
const SECTIONS = [
  {
    id: 'neural_networks',
    title: 'Neural Networks',
    desc: 'From perceptrons to agents — with diagrams and maths.',
    topics: [
      { file: 'neural_networks/01_basic_neural_networks.md', tag: '01', title: 'Basic Neural Networks',      desc: 'Perceptron, activation functions, feedforward networks, backpropagation.' },
      { file: 'neural_networks/02_training_issues.md',        tag: '02', title: 'Training Issues & Solutions', desc: 'Vanishing gradients, overfitting, batch normalisation, dropout, optimisers.' },
      { file: 'neural_networks/03_word_embeddings.md',        tag: '03', title: 'Word Embeddings',            desc: 'Word2Vec, GloVe, CBOW, Skip-gram, and distributed representations.' },
      { file: 'neural_networks/04_rnns_lstms.md',             tag: '04', title: 'RNNs & LSTMs',              desc: 'Recurrent networks, LSTM gates, vanishing gradients in sequences.' },
      { file: 'neural_networks/05_cnns.md',                   tag: '05', title: 'Convolutional Networks',    desc: 'Convolution, pooling, receptive fields, and standard CNN architectures.' },
      { file: 'neural_networks/06_transformers.md',           tag: '06', title: 'Transformers & Attention',  desc: 'Self-attention, multi-head attention, positional encoding, encoder–decoder.' },
      { file: 'neural_networks/07_architecture_guide.md',     tag: '07', title: 'Architecture Guide',        desc: 'Choosing the right architecture — a decision framework.' },
      { file: 'neural_networks/08_agents_llms.md',            tag: '08', title: 'Agents & LLMs',             desc: 'Large language models, RAG, tool use, agentic systems, prompting.' },
    ]
  }
  /* Add future sections here:
  ,{
    id: 'ml_basics',
    title: 'ML Basics',
    topics: [ ... ]
  } */
];

/* ════════════════════════════════════════
   Markdown → HTML pipeline
════════════════════════════════════════ */
marked.use({ gfm: true, breaks: false });

// Protect math from marked's markdown parser
function protectMath(md) {
  const store = [];
  const out = md
    .replace(/\$\$([\s\S]+?)\$\$/g, m => { store.push(m); return 'DMATH' + (store.length-1) + 'DMATHEND'; })
    .replace(/\$([^\$\n]+?)\$/g,    m => { store.push(m); return 'IMATH' + (store.length-1) + 'IMATHEND'; });
  return { out, store };
}

function restoreMath(html, store) {
  return html
    .replace(/DMATH(\d+)DMATHEND/g, (_, i) => store[+i])
    .replace(/IMATH(\d+)IMATHEND/g, (_, i) => store[+i]);
}

// Rewrite relative image src to be root-relative
function fixImages(html, basePath) {
  return html.replace(/<img([^>]*?)src="([^"]+)"([^>]*?)>/g, (full, pre, src, post) => {
    if (/^(https?:|\/|data:)/.test(src)) return full;
    return `<img${pre}src="${basePath}${src}"${post}>`;
  });
}

// Tag internal .md links so click delegation can intercept them
function fixLinks(html, basePath) {
  return html.replace(/href="([^"]+\.md)"/g, (_, href) => {
    const resolved = /^https?:/.test(href) ? href : basePath + href;
    return `href="javascript:void(0)" data-md="${resolved}"`;
  });
}

/* ════════════════════════════════════════
   Routing (hash-based, shareable URLs)
════════════════════════════════════════ */
function navigate(filePath) {
  location.hash = filePath ? '#' + filePath : '#';
}

window.addEventListener('hashchange', handleRoute);

function handleRoute() {
  const hash = decodeURIComponent(location.hash.replace(/^#/, ''));
  hash ? loadFile(hash) : showHome();
}

/* ════════════════════════════════════════
   Active sidebar state
════════════════════════════════════════ */
function setActive(filePath) {
  document.querySelectorAll('.nav-item').forEach(el =>
    el.classList.toggle('active', el.dataset.file === filePath)
  );
  const active = document.querySelector(`.nav-item[data-file="${filePath}"]`);
  document.getElementById('breadcrumb').textContent =
    active ? active.textContent.trim() : 'Home';
}

/* ════════════════════════════════════════
   Home page (card grid)
════════════════════════════════════════ */
function showHome() {
  setActive('');
  document.getElementById('breadcrumb').textContent = 'Home';

  const sectionsHtml = SECTIONS.map(sec => `
    <div class="section-row">
      <div class="section-row-label">${sec.title}</div>
      <div class="card-grid">
        ${sec.topics.map(t => `
          <div class="topic-card" onclick="navigate('${t.file}')">
            <div class="card-tag">${t.tag}</div>
            <div class="card-title">${t.title}</div>
            <div class="card-desc">${t.desc}</div>
          </div>`).join('')}
      </div>
    </div>`).join('');

  document.getElementById('article').innerHTML = `
    <div class="home-hero">
      <h1>ML / DL Study Notes</h1>
      <p>Structured notes with diagrams and maths, built from short-notes PDFs.</p>
    </div>
    ${sectionsHtml}`;

  window.scrollTo(0, 0);
  closeSidebarMobile();
}

/* ════════════════════════════════════════
   Load & render a markdown file
════════════════════════════════════════ */
async function loadFile(filePath) {
  setActive(filePath);

  const art = document.getElementById('article');
  art.innerHTML = '<div class="loading"><div class="spinner"></div><span>Loading…</span></div>';

  const lastSlash = filePath.lastIndexOf('/');
  const basePath  = lastSlash >= 0 ? filePath.slice(0, lastSlash + 1) : '';

  try {
    const res = await fetch(filePath);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const raw = await res.text();

    const { out: prot, store } = protectMath(raw);
    let html = marked.parse(prot);
    html = restoreMath(html, store);
    html = fixImages(html, basePath);
    html = fixLinks(html, basePath);

    art.innerHTML = html;

    // Syntax-highlight code blocks
    art.querySelectorAll('pre code').forEach(el => hljs.highlightElement(el));

    // Typeset maths
    if (window.MathJax?.typesetPromise) {
      await MathJax.typesetPromise([art]);
    }

    window.scrollTo(0, 0);
  } catch (err) {
    art.innerHTML = `
      <div style="text-align:center;padding:80px 0;color:#6b7280">
        <p style="font-size:2rem;margin-bottom:12px">⚠️</p>
        <p>Could not load <code style="background:#f0fdf4;border:1px solid #d1fae5;padding:2px 6px;border-radius:4px">${filePath}</code></p>
        <p style="font-size:0.83rem;margin-top:8px;color:#9ca3af">${err.message}</p>
      </div>`;
  }

  closeSidebarMobile();
}

/* ════════════════════════════════════════
   Delegated click for internal .md links
════════════════════════════════════════ */
document.getElementById('article').addEventListener('click', e => {
  const a = e.target.closest('[data-md]');
  if (!a) return;
  e.preventDefault();
  navigate(a.dataset.md);
});

/* ════════════════════════════════════════
   Sidebar helpers
════════════════════════════════════════ */
function toggleGroup(id) {
  document.getElementById(id).classList.toggle('open');
}

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
}

function closeSidebarMobile() {
  if (window.innerWidth <= 800)
    document.getElementById('sidebar').classList.remove('open');
}

/* ════════════════════════════════════════
   Init
════════════════════════════════════════ */
handleRoute();
</script>
